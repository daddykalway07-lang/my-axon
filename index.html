<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axon AI | Made in India</title>
    <style>
        :root { --border: #2F3336; --bg: #000000; --accent: #FF9933; --green: #128807; }
        * { box-sizing: border-box; transition: 0.3s; }
        body, html { background-color: var(--bg); color: #E7E9EA; font-family: -apple-system, sans-serif; margin: 0; height: 100vh; overflow: hidden; }

        /* Auth Screens */
        #auth-container { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .auth-card { background: #111; padding: 40px; border-radius: 25px; border: 1px solid var(--border); width: 100%; max-width: 380px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .auth-card h1 { font-size: 2rem; letter-spacing: 5px; margin-bottom: 5px; background: linear-gradient(to right, #FF9933, #ffffff, #128807); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .auth-card input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 12px; outline: none; }
        .auth-card input:focus { border-color: var(--accent); }
        .auth-card button { width: 100%; padding: 15px; background: #fff; color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 1rem; }
        .auth-card button:hover { background: #eee; transform: translateY(-2px); }
        .toggle-link { color: var(--accent); cursor: pointer; font-size: 0.8rem; margin-top: 15px; display: block; }

        /* Main App Interface */
        #app { display: none; height: 100vh; width: 100%; display: flex; }
        #sidebar { width: 280px; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 25px; background: #000; }
        #main-chat { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }

        header { padding: 20px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .india-badge { font-size: 10px; border: 1px solid var(--green); color: var(--green); padding: 3px 10px; border-radius: 20px; font-weight: bold; }

        #chat-box { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 25px; }
        .msg { max-width: 80%; line-height: 1.6; font-size: 1rem; position: relative; }
        .user-msg { align-self: flex-end; background: #16181C; padding: 15px 20px; border-radius: 20px 20px 2px 20px; border: 1px solid var(--border); }
        .axon-msg { align-self: flex-start; color: #E7E9EA; border-left: 3px solid var(--accent); padding-left: 20px; }

        .input-area { padding: 30px 60px; background: #000; }
        .input-wrapper { display: flex; background: #16181C; border: 1px solid var(--border); border-radius: 40px; padding: 5px 20px; align-items: center; }
        #userInput { flex: 1; background: transparent; border: none; color: #fff; padding: 15px; outline: none; font-size: 1rem; }
        #sendBtn { background: #fff; color: #000; border: none; border-radius: 50%; width: 45px; height: 45px; cursor: pointer; font-weight: bold; font-size: 1.2rem; }

        .history-item { padding: 10px; color: #71767B; font-size: 0.85rem; cursor: pointer; border-radius: 8px; margin-bottom: 5px; }
        .history-item:hover { background: #16181C; color: #fff; }
    </style>
</head>
<body>

    <div id="auth-container">
        <div class="auth-card" id="login-box">
            <h1>AXON</h1>
            <p id="auth-title">Login to your account</p>
            <input type="email" id="email" placeholder="Email Address">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleAuth()">Continue</button>
            <span class="toggle-link" onclick="toggleAuth()">New to Axon? Create Account</span>
            <p id="error-msg" style="color: #ff4444; font-size: 12px; margin-top: 15px; display: none;"></p>
        </div>
    </div>

    <div id="app">
        <div id="sidebar">
            <h2 style="letter-spacing: 3px;">AXON</h2>
            <div id="chat-history" style="flex:1; margin-top:20px; overflow-y:auto;">
                <p style="font-size: 11px; color: #444;">RECENT QUERIES</p>
            </div>
            <button onclick="logout()" style="background:none; border: 1px solid #333; color:#71767B; padding:10px; border-radius:10px; cursor:pointer;">Logout</button>
        </div>

        <div id="main-chat">
            <header>
                <div id="user-display" style="font-size: 0.9rem; color: #71767B;">Welcome</div>
                <span class="india-badge">MADE IN INDIA</span>
            </header>
            <div id="chat-box"></div>
            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="userInput" placeholder="Message Axon..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button id="sendBtn" onclick="sendMessage()">↑</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const API_KEY = "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";
    let isLogin = true;

    // Auth Logic
    function toggleAuth() {
        isLogin = !isLogin;
        document.getElementById('auth-title').innerText = isLogin ? "Login to your account" : "Create new account";
        document.querySelector('.toggle-link').innerText = isLogin ? "New to Axon? Create Account" : "Already have an account? Login";
    }

    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const err = document.getElementById('error-msg');

        if(email.includes('@') && pass.length >= 6) {
            localStorage.setItem('axon_user', email);
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            document.getElementById('user-display').innerText = `Active: ${email}`;
            displayMessage('axon', `Namaste! Axon system is online for ${email}. How can I assist you today?`);
        } else {
            err.innerText = "Invalid credentials. Password must be 6+ chars.";
            err.style.display = 'block';
        }
    }

    // Chat Logic
    function displayMessage(role, text) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${role}-msg`;
        div.innerHTML = role === 'axon' ? `<b>Axon</b><br>${text}` : text;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if(!text) return;

        displayMessage('user', text);
        input.value = '';

        try {
            // Using a stable model name
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Authorization": `Bearer ${API_KEY}`,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant",
                    messages: [
                        {role: "system", content: "You are Axon, a witty Indian AI. Use Hinglish naturally. Be sharp, smart, and patriotic."},
                        {role: "user", content: text}
                    ],
                    temperature: 0.7
                })
            });

            const data = await response.json();
            
            if(data.choices && data.choices[0]) {
                displayMessage('axon', data.choices[0].message.content);
                updateHistory(text);
            } else {
                displayMessage('axon', "Bhai, Groq API response nahi de raha. Link live hai ya local?");
            }
        } catch (e) {
            displayMessage('axon', "<b>Connectivity Issue!</b><br>Bhai, local file se API block ho rahi hai. Ise <b>Vercel</b> pe upload karo, wahan ye 100% chalega.");
        }
    }

    function updateHistory(text) {
        const hist = document.getElementById('chat-history');
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerText = text.substring(0, 25) + "...";
        hist.prepend(item);
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }

    // Auto-login check
    if(localStorage.getItem('axon_user')) {
        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        document.getElementById('user-display').innerText = `Active: ${localStorage.getItem('axon_user')}`;
        displayMessage('axon', "Welcome back! System ready.");
    }
</script>
</body>
</html>
